      margin:12px 0;
    }
    a {
      color:#0f0;
      font-weight:bold;
      text-decoration:none;
    }
    .download {
      display:inline-block;
      background:#0f0;
      color:#000;
      padding:10px 20px;
      border-radius:4px;
      margin:8px 5px 0 0;
      cursor:pointer;
      font-weight:bold;
    }
    .game { display:inline-block; background:#0f0; color:#000; padding:4px 10px; border-radius:4px; margin-left:8px; }

</head>
<body>

  <div class="download" onclick="downloadBat('吱吱机房脱控【加强版】.bat', advancedCode)">加强版</div>
  <div class="download" onclick="downloadBat('吱吱机房【恢复极域】.bat', restoreCode)">恢复极域</div>
</div>

<script>
const originalCode = `@echo off
echo 吱吱机房脱控 - 原版
Net session >nul 2>&1 || powershell Start-Process "%~f0" -Verb RunAs && exit
taskkill /im studentmain.exe /f >nul 2>&1
sc stop TDFileFilter >nul 2>&1
sc delete TDFileFilter >nul 2>&1
echo 执行完成！
pause
`;

const advancedCode = `@echo off
echo 吱吱机房脱控 - 加强版
Net session >nul 2>&1 || powershell Start-Process "%~f0" -Verb RunAs && exit
taskkill /f /t /im studentmain.exe >nul 2>&1
taskkill /f /t /im stulock.exe >nul 2>&1
taskkill /f /t /im tdstudent.exe >nul 2>&1
sc stop TDFileFilter >nul 2>&1
sc delete TDFileFilter >nul 2>&1
sc stop TDSafeGuard >nul 2>&1
sc delete TDSafeGuard >nul 2>&1
echo 脱控完成！
pause
`;

const restoreCode = `@echo off
echo 吱吱机房 - 恢复极域（仅机房有效）
Net session >nul 2>&1 || powershell Start-Process "%~f0" -Verb RunAs && exit
echo 尝试启动极域客户端...
start "" "C:\Program Files (x86)\Mythware\极域电子教室学生端\StudentMain.exe" >nul 2>&1
start "" "C:\Program Files\Mythware\极域电子教室学生端\StudentMain.exe" >nul 2>&1
echo 尝试恢复驱动服务...
sc create TDFileFilter type= kernel binPath= "C:\Program Files (x86)\Mythware\极域电子教室学生端\TDFileFilter.sys" >nul 2>&1
sc start TDFileFilter >nul 2>&1
echo.
echo 【测试环境提示】本机未安装极域，此为正常现象！
echo 【机房使用】重启电脑即可自动恢复
echo.
pause
`;

function downloadBat(filename, content) {
  const blob = new Blob([content], { type: "application/bat" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
const drops = Array(Math.floor(canvas.width / 14)).fill(1);
function matrix(){
  ctx.fillStyle='rgba(0,0,0,0.05)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#0f0';
  ctx.font='14px Consolas';
  for(let i=0;i<drops.length;i++){
    ctx.fillText(String.fromCharCode(Math.random()*128),i*14,drops[i]*14);
    if(drops[i]*14>canvas.height&&Math.random()>0.97)drops[i]=0;
    drops[i]++;
  }
}
setInterval(matrix,30);
</script>
</body>
